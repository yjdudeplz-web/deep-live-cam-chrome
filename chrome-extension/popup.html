<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep-Live-Cam Chrome</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Deep-Live-Cam</h1>
      <span class="badge">Chrome OS</span>
    </header>

    <section id="status-section" class="card">
      <h2>Status</h2>
      <div class="status-grid">
        <div class="status-item">
          <span class="label">Models</span>
          <span id="models-status" class="value loading">Checking...</span>
        </div>
        <div class="status-item">
          <span class="label">Device</span>
          <span id="device-profile" class="value">Detecting...</span>
        </div>
        <div class="status-item">
          <span class="label">Memory</span>
          <span id="memory-info" class="value">-</span>
        </div>
      </div>
    </section>

    <section id="settings-section" class="card">
      <h2>Settings</h2>
      <div class="setting-group">
        <label for="quality-select">Quality Mode</label>
        <select id="quality-select">
          <option value="performance">Performance</option>
          <option value="balanced" selected>Balanced</option>
          <option value="quality">Quality</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="resolution-select">Max Resolution</label>
        <select id="resolution-select">
          <option value="480">480p</option>
          <option value="720" selected>720p</option>
          <option value="1080">1080p</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="fps-select">Target FPS</label>
        <select id="fps-select">
          <option value="10">10 FPS</option>
          <option value="15" selected>15 FPS</option>
          <option value="30">30 FPS</option>
        </select>
      </div>
      <div class="setting-group checkbox-group">
        <input type="checkbox" id="face-enhancer-toggle">
        <label for="face-enhancer-toggle">Face Enhancer (uses more memory)</label>
      </div>
      <div class="setting-group checkbox-group">
        <input type="checkbox" id="cache-toggle" checked>
        <label for="cache-toggle">Enable Model Caching</label>
      </div>
    </section>

    <section id="download-section" class="card">
      <h2>Models</h2>
      <div id="download-progress" class="progress-container hidden">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">0%</span>
      </div>
      <button id="download-btn" class="btn primary">
        Download Models
      </button>
    </section>

    <section class="card">
      <h2>🎭 Troll Mode</h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
        Use face swap on video chat sites!
      </p>
      <div class="action-buttons">
        <button id="open-face-swap-btn" class="btn primary">
          🎥 Open Face Swap
        </button>
      </div>
    </section>

    <section class="card">
      <h2>🚀 Quick Launch</h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
        Start face swap and open a chat site!
      </p>
      <div class="action-buttons">
        <button data-site="omegle" class="btn secondary" style="background: #4CAF50;">
          💬 Omegle
        </button>
        <button data-site="ometv" class="btn secondary" style="background: #2196F3;">
          📹 OmeTV
        </button>
        <button data-site="chatrandom" class="btn secondary" style="background: #9C27B0;">
          🎲 ChatRandom
        </button>
      </div>
    </section>

    <section class="card">
      <h2>Quick Actions</h2>
      <div class="action-buttons">
        <button id="open-settings-btn" class="btn secondary">
          Settings
        </button>
      </div>
    </section>

    <footer>
      <p>Optimized for Chrome OS with NAND storage</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
