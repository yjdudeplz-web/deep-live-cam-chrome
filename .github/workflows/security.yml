name: Security Scanning

on:
  push:
    branches: [ main ]
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/security.yml'
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, MPL-2.0

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install pip-audit
        run: |
          pip install pip-audit
          
      - name: Scan for vulnerabilities
        run: |
          pip-audit -r requirements.txt -r requirements-chrome.txt || true
          
      - name: Run safety check
        run: |
          pip install safety
          safety check -r requirements.txt || true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          noverifications: true
          only_verified: true

  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate SBOM
        run: |
          pip install syft
          syft . -o spdx-json=sbom.spdx.json || true
          
      - name: Scan with Grype
        run: |
          pip install grype
          grype sbom:sbom.spdx.json || true
          
      - name: Upload SBOM to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30
          
      - name: Upload to GitHub Security Tab
        uses: github/upload-security-artifacts@v1
        if: always()
        with:
          name: security-artifacts
          artifacts: sbom.spdx.json
          category: sbom

  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Bandit
        run: |
          pip install bandit bandit-sarif-formatter
          
      - name: Run Bandit
        run: |
          bandit -r modules/ -f sarif -o bandit-results.sarif || true
          
      - name: Upload Bandit results
        uses: github/upload-security-artifacts@v1
        if: always()
        with:
          name: bandit-results
          artifacts: bandit-results.sarif
          category: security_results

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true
