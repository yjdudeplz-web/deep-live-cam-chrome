name: 'Auto Labeler'

on:
  pull_request:
    types: [opened, synchronize, edited]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label_pr:
    name: 'Label PR'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4
        
      - name: 'Label PR'
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  label_issue:
    name: 'Label Issue'
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: 'Label Issue'
        run: |
          LABEL=""
          
          # Check title/body for keywords
          TITLE="${{ github.event.issue.title }}"
          BODY="${{ github.event.issue.body }}"
          CONTENT="$TITLE $BODY"
          
          # Extension labels
          if echo "$CONTENT" | grep -qi "chrome\|extension\|browser"; then
            LABEL="$LABEL chrome-extension,"
          fi
          
          # Bug labels
          if echo "$CONTENT" | grep -qi "bug\|crash\|error\|fix\|broken"; then
            LABEL="$LABEL bug,"
          fi
          
          # Feature labels
          if echo "$CONTENT" | grep -qi "feature\|enhancement\|request\|add"; then
            LABEL="$LABEL enhancement,"
          fi
          
          # Documentation
          if echo "$CONTENT" | grep -qi "docs\|readme\|documentation"; then
            LABEL="$LABEL documentation,"
          fi
          
          # Performance
          if echo "$CONTENT" | grep -qi "performance\|speed\|slow\|optimize"; then
            LABEL="$LABEL performance,"
          fi
          
          # Low-end/Chrome OS
          if echo "$CONTENT" | grep -qi "low-end\|chrome-os\|chromebook\|lite\|mini"; then
            LABEL="$LABEL chrome-os,"
          fi
          
          # AI/ML
          if echo "$CONTENT" | grep -qi "ai\|model\|face\|swap\|onnx"; then
            LABEL="$LABEL ai,"
          fi
          
          # Remove leading comma
          LABEL=$(echo "$LABEL" | sed 's/^,//')
          
          if [ -n "$LABEL" ]; then
            echo "Adding labels: $LABEL"
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels \
              -d "{\"labels\": [\"$LABEL\"]}"
          fi
