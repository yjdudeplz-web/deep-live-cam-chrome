name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Pre-release'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.10'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using manually specified version: $VERSION"
            echo "is_tag=false" >> $GITHUB_OUTPUT
          else
            # Extract version from tag
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "Invalid tag format. Expected v1.2.3"
              exit 1
            fi
            echo "Using tag version: $VERSION"
            echo "is_tag=true" >> $GITHUB_OUTPUT
          fi
          
          # Remove 'v' prefix for comparison
          VERSION_NUM=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_num=$VERSION_NUM" >> $GITHUB_OUTPUT
          
      - name: Get commit history
        run: |
          git log --oneline ${{ github.event.repository.default_branch }}..HEAD | wc -l
          
      - name: Check if version already exists
        run: |
          if git tag -l | grep -q "^${{ steps.version.outputs.version }}$"; then
            echo "Tag ${{ steps.version.outputs.version }} already exists!"
            exit 1
          fi
        continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
          
      - name: Run tests
        run: |
          python -m pytest tests/ -v
          
      - name: Verify modules
        run: |
          python -c "
            import sys
            sys.path.insert(0, '.')
            from modules import chrome_os, memory_optimize, nand_optimize
            print('All modules OK')
          "

  build-changelog:
    name: Build Changelog
    runs-on: ubuntu-latest
    needs: [validate, test]
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "Previous tag: $PREV_TAG"
          echo "Current tag: ${{ needs.validate.outputs.version }}"
          
          # Generate changelog using git changelog
          CHANGELOG="# Changelog\n\n"
          CHANGELOG+="## ${{ needs.validate.outputs.version }}\n\n"
          
          # Get commits since last tag
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --format="%s")
          else
            COMMITS=$(git log --oneline --format="%s")
          fi
          
          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "feat|feature|add" | sed 's/^/- /')
          FIXES=$(echo "$COMMITS" | grep -iE "fix|bug" | sed 's/^/- /')
          CHORES=$(echo "$COMMITS" | grep -iE "chore|deps|ci" | sed 's/^/- /')
          DOCS=$(echo "$COMMITS" | grep -iE "docs?|readme" | sed 's/^/- /')
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### Features\n$FEATURES\n\n"
          fi
          
          if [ -n "$FIXES" ]; then
            CHANGELOG+="### Bug Fixes\n$FIXES\n\n"
          fi
          
          if [ -n "$DOCS" ]; then
            CHANGELOG+="### Documentation\n$DOCS\n\n"
          fi
          
          if [ -n "$CHORES" ]; then
            CHANGELOG+="### Maintenance\n$CHORES\n\n"
          fi
          
          # Remove trailing newlines
          CHANGELOG=$(echo "$CHANGELOG" | sed '${/^$/d}')
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [validate, test, build-changelog]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Create tag if needed
        if: needs.validate.outputs.is_tag == 'false'
        run: |
          git tag ${{ needs.validate.outputs.version }}
          git push origin ${{ needs.validate.outputs.version }}
          
      - name: Generate release notes
        id: release_notes
        run: |
          # Get commit count
          COMMIT_COUNT=$(git rev-list --count HEAD)
          
          # Generate contributors list
          CONTRIBUTORS=$(git log --format='%aN' | sort -u | tr '\n' ',' | sed 's/,$//')
          
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed\n\n" >> $GITHUB_OUTPUT
          echo "${{ needs.build-changelog.outputs.changelog }}" >> $GITHUB_OUTPUT
          echo "\n\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.repository.default_branch }}...${{ needs.validate.outputs.version }}" >> $GITHUB_OUTPUT
          echo "\n**Contributors**: $CONTRIBUTORS" >> $GITHUB_OUTPUT
          echo "\n**Statistics**:\n- Commits: $COMMIT_COUNT\n- Files changed: $(git diff --stat HEAD~1 | tail -1)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: Release ${{ needs.validate.outputs.version }}
          body: ${{ steps.release_notes.outputs.release_notes }}
          draft: true
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
          commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-assets:
    name: Build Release Assets
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements-chrome.txt
          
      - name: Build Chrome Extension
        run: |
          mkdir -p dist
          cd chrome-extension
          zip -r ../dist/deep-live-cam-chrome-${{ needs.validate.outputs.version }}.zip .
          
      - name: Upload Extension
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-draft-release.outputs.upload_url }}
          asset_path: dist/deep-live-cam-chrome-${{ needs.validate.outputs.version }}.zip
          asset_name: deep-live-cam-chrome-${{ needs.validate.outputs.version }}.zip
          asset_content_type: application/zip

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [validate, create-draft-release]
    steps:
      - name: Create issue for release notes verification
        if: needs.validate.outputs.is_tag == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
            ## 🎉 Release ${{ needs.validate.outputs.version }} Ready for Review
            
            A draft release has been created: https://github.com/${{ github.repository }}/releases
            
            ### Checklist
            - [ ] Verify version number is correct
            - [ ] Review changelog entries
            - [ ] Check that all expected changes are included
            - [ ] Verify extension zip is attached
            - [ ] Publish release when ready
            
            _Auto-generated by GitHub Actions_
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📝 Review Release ${{ needs.validate.outputs.version }}',
              body: body,
              labels: ['release', 'automated']
            });

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true
