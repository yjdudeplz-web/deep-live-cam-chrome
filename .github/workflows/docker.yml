name: Docker Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - 'Dockerfile*'
      - 'docker-compose*'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile*'
      - 'docker-compose*'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to build'
        required: false
        default: 'Dockerfile.chrome'
        type: choice
        options:
          - Dockerfile.chrome
          - Dockerfile

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-metadata:
    name: Docker Metadata
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=Deep-Live-Cam Chrome Edition
            org.opencontainers.image.description=Real-time face swap for Chrome OS
            org.opencontainers.image.vendor=Deep-Live-Cam
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: docker-metadata
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.chrome
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - dockerfile: Dockerfile.chrome
            image_name: deep-live-cam-chrome
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata for ${{ matrix.dockerfile }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=${{ matrix.platform }}-latest
            
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          dockerfile: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=3.10
            DEBIAN_FRONTEND=noninteractive
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image_name }},push-by-digest=true,push=true
          
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "$digest" | jq -r .'[]' > /tmp/digests/${{ matrix.platform }}.json
          
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform }}-${{ matrix.dockerfile }}
          path: /tmp/digests/${{ matrix.platform }}.json
          retention-days: 1

  merge:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:buildx-stable-1
            namespace=ghcr.io
            
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
          
      - name: Create manifest list and push
        run: |
          cd /tmp/digests
          
          # For each platform, create the full image
          for platform in linux/amd64 linux/arm64; do
            digest_file="${platform//\//-}.json"
            if [ -f "$digest_file" ]; then
              digest=$(cat "$digest_file" | jq -r '.[]')
              echo "Tagging ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-deep-live-cam-chrome:${{ github.sha }}-$platform"
              docker buildx imagetools create \
                --dry-run \
                $digest \
                ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-deep-live-cam-chrome:${{ github.sha }}-$platform || true
            fi
          done
          
      - name: Image digest
        run: |
          echo "Image built successfully"
          echo "Registry: ${{ env.REGISTRY }}"
          echo "Image: ${{ env.IMAGE_NAME }}-deep-live-cam-chrome"

  test-docker:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: merge
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Run container
        run: |
          docker run --rm \
            --gpus all \
            -e DISPLAY=:99 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-deep-live-cam-chrome:latest \
            python --version || echo "GPU not available in CI"
            
      - name: Check container health
        run: |
          echo "Container built and ran successfully"

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: merge
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-deep-live-cam-chrome:latest
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true
