name: 'Welcome Bot'

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    name: 'Welcome Message'
    runs-on: ubuntu-latest
    steps:
      - name: 'Welcome PR'
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const creator = pr.user.login;
            
            // Check if first PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all'
            });
            
            const userPrs = prs.filter(p => p.user.login === creator);
            
            const isFirst = userPrs.length === 1;
            
            const welcomeMessage = isFirst 
              ? `👋 Hello @${creator}! Welcome to Deep-Live-Cam Chrome!\n\n` +
                `🎉 Thanks for your first pull request!\n\n` +
                `Please make sure to:\n` +
                `- ⭐ Star this repo if you like it\n` +
                `- 📖 Read the contributing guidelines\n` +
                `- ✅ Test your changes locally before submitting\n\n` +
                `We're excited to have you contribute! 🚀`
              : `👋 Hello @${creator}! Thanks for another contribution!\n\n` +
                `Please ensure you've:\n` +
                `- ✅ Tested changes locally\n` +
                `- ✅ Updated documentation if needed\n` +
                `- ✅ No merge conflicts`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: welcomeMessage
            });
            
            // Add welcome label
            if (isFirst) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['first-time-contributor', 'welcome']
              });
            }

      - name: 'Welcome Issue'
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const creator = issue.user.login;
            
            const welcomeMessage = `👋 Hello @${creator}!\n\n` +
              `Thanks for opening an issue! 🎉\n\n` +
              `To help us understand your issue better, please provide:\n\n` +
              `- 📝 Clear description of the problem\n` +
              `- 🔧 Steps to reproduce\n` +
              `- 💻 Browser and OS version\n` +
              `- 📸 Screenshots if applicable\n\n` +
              `We'll review your issue as soon as possible! 🔍`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: welcomeMessage
            });
