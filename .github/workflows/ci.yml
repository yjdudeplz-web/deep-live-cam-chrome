name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.10'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install ruff black flake8
          
      - name: Run Ruff linter
        run: |
          ruff check .
          
      - name: Check code formatting
        run: |
          black --check .

  test:
    name: Test Python Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run tests
        run: |
          python -m pytest tests/ -v

  build-extension:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Validate extension
        run: |
          cd chrome-extension
          # Check manifest.json is valid JSON
          python3 -c "import json; json.load(open('manifest.json'))"
          
      - name: Package extension
        run: |
          mkdir -p dist
          cd chrome-extension
          zip -r ../dist/extension.zip .
          
      - name: Upload extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/extension.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ lint, test, build-extension ]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download extension
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension
          path: dist/
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/extension.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote:
    name: Promote to Sponsors
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Send to Sponsor Channels
        run: |
          echo "Release ${{ github.event.release.tag_name }} published!"
          echo "Notify sponsors on Discord/Telegram"
          # Add your sponsor notification logic here

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
