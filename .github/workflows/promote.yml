          # curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"content":"New release!"}'

  update-social-proof:
    name: Update Social Proof
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Get current stats
        id: stats
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            core.setOutput('stars', repo.stargazers_count);
            core.setOutput('forks', repo.forks_count);
            core.setOutput('downloads', releases[0]?.assets?.reduce((sum, a) => sum + a.download_count, 0) || 0);
            core.setOutput('release_version', releases[0]?.tag_name || 'v0.0.0');

      - name: Create Social Proof Badge
        run: |
          echo "Social Proof Generated:"
          echo "- Stars: ${{ steps.stats.outputs.stars }}"
          echo "- Forks: ${{ steps.stats.outputs.forks }}"
          echo "- Downloads: ${{ steps.stats.outputs.downloads }}"
          echo "- Version: ${{ steps.stats.outputs.release_version }}"
          
          # Create a shield.io badge dynamically
          BADGE_URL="https://img.shields.io/badge/"
          BADGE_URL+="stars-${{ steps.stats.outputs.stars }}-yellow"
          BADGE_URL+="?style=flat-square"
          echo "Badge URL: $BADGE_URL"

      - name: Update README with fresh stats
        run: |
          echo "README would be updated with fresh stats"

  thank-contributors:
    name: Thank Contributors
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Generate Thank You Message
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const contributors = [...new Set(commits.map(c => c.author?.login))].filter(Boolean);
            console.log('Recent contributors:', contributors.slice(0, 10));
            
            const message = `Thank you to our recent contributors: ${contributors.slice(0, 5).join(', ')}! 🎉`;
            console.log(message);
