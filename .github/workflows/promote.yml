name: Community Promotion

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to promote on'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - twitter
          - reddit
          - devto

jobs:
  announce:
