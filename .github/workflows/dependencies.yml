name: Dependency Updates

on:
  schedule:
    # Run every 10 minutes for frequent checks
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update'
        required: false
        default: 'main'
      dry_run:
        description: 'Dry run only'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.10'
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

jobs:
  check-updates:
    name: Check for Updates
    runs-on: ubuntu-latest
    outputs:
      python_updates: ${{ steps.python.outputs.updates }}
      has_updates: ${{ steps.python.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Check Python dependencies
        id: python
        run: |
          pip install pipdate pyyaml
            
          echo "Checking requirements.txt..."
          pipdate -r requirements.txt --diff > python_updates.txt || true
          
          if [ -s python_updates.txt ]; then
            echo "Updates found:"
            cat python_updates.txt
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "updates<<EOF" >> $GITHUB_OUTPUT
            cat python_updates.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "No updates found"
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "updates=" >> $GITHUB_OUTPUT
          fi
          
      - name: Upload update report
        if: steps.python.outputs.has_updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: python-updates
          path: python_updates.txt
          retention-days: 7

  create-pr:
    name: Create Update PR
    runs-on: ubuntu-latest
    needs: check-updates
    if: |
      needs.check-updates.outputs.has_updates == 'true'
      && env.DRY_RUN != 'true'
      && github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Create update branch
        run: |
          BRANCH_NAME="update/dependencies-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
        id: branch
        shell: bash
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Apply Python updates
        run: |
          pip install pipdate
            
          echo "Updating requirements.txt..."
          pipdate -r requirements.txt || true
          
          echo "Updating requirements-chrome.txt..."
          pipdate -r requirements-chrome.txt || true
          
      - name: Update pyproject.toml
        run: |
          if [ -f pyproject.toml ]; then
            pip install pdm || true
            # Update pdm dependencies if available
            pdm update || true
          fi
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add requirements.txt requirements-chrome.txt pyproject.toml || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(deps): update dependencies
            
            Auto-generated dependency update
            - Updated Python packages
            - Updated Python version: ${{ env.PYTHON_VERSION }}"
          fi
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.BRANCH_NAME }}
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.branch.outputs.BRANCH_NAME }}
          title: "chore(deps): update dependencies $(date +%Y-%m-%d)"
          body: |
            ## Dependency Updates
            
            This PR updates Python dependencies to their latest versions.
            
            ### Changes
            - Updated Python packages in requirements.txt
            - Updated Python packages in requirements-chrome.txt
            - Updated Python version: ${{ env.PYTHON_VERSION }}
            
            ### Checklist
            - [ ] Tests pass
            - [ ] Code still works after update
            - [ ] No breaking changes introduced
            
            _Auto-generated by GitHub Actions_
          labels: |
            dependencies
            automated
          reviewers: |
            ${{ github.actor }}
          assignees: |
            ${{ github.actor }}
            
      - name: Add PR info as comment
        if: failure()
        run: |
          echo "Failed to create PR. Please check the workflow logs."

  summarize:
    name: Summarize Updates
    runs-on: ubuntu-latest
    needs: check-updates
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.check-updates.outputs.has_updates }}" == "true" ]]; then
            echo "✅ Updates available" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Details:" >> $GITHUB_STEP_SUMMARY
            cat python_updates.txt >> $GITHUB_STEP_SUMMARY || echo "See artifacts for details" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Download update report
        if: needs.check-updates.outputs.has_updates == 'true'
        uses: actions/download-artifact@v4
        with:
          name: python-updates
          path: .
          
      - name: Display updates
        if: needs.check-updates.outputs.has_updates == 'true'
        run: |
          echo "Available updates:"
          cat python_updates.txt || echo "See artifacts"

concurrency:
  group: deps-${{ github.ref }}
  cancel-in-progress: true
