name: Multi-Platform Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements*.txt'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: ['3.10', '3.11', '3.12']
        exclude:
          - os: windows-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
            
      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-chrome.txt
        shell: bash
        
      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-chrome.txt
        shell: pwsh
        
      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-chrome.txt
        shell: bash
        
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
          
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            tests/.pytest_cache/
          retention-days: 7
          
      - name: Generate coverage report
        run: |
          pip install pytest-cov coverage
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=html
          
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install linting tools
        run: |
          pip install ruff black flake8 mypy pydocstyle
          
      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github
        continue-on-error: true
        
      - name: Check code formatting
        run: |
          black --check . || true
          
      - name: Run type checking
        run: |
          pip install types-all
          mypy modules/ --ignore-missing-imports || true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements-chrome.txt
          
      - name: Test module imports
        run: |
          python -c "
            import sys
            sys.path.insert(0, '.')
            from modules import chrome_os, memory_optimize, nand_optimize, adaptive_quality, model_compress
            print('All modules imported successfully')
          "
          
      - name: Test Chrome OS detection
        run: |
          python -c "
            from modules.chrome_os import detect_chrome_os, is_crostini
            print(f'Chrome OS detected: {detect_chrome_os()}')
            print(f'Is Crostini: {is_crostini()}')
          "
          
      - name: Test memory optimizer
        run: |
          python -c "
            from modules.memory_optimize import MemoryOptimizer
            opt = MemoryOptimizer()
            print(f'Device RAM: {opt.get_total_memory_mb()} MB')
            print(f'Optimal batch size: {opt.get_optimal_batch_size()}')
          "
          
      - name: Test NAND optimizer
        run: |
          python -c "
            from modules.nand_optimize import NANDOptimizer
            opt = NANDOptimizer()
            print(f'Storage type: {opt.detect_storage_type()}')
          "

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
