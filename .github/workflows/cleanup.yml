name: 'Repository Maintenance'

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode'
        required: true
        type: choice
        options:
          - full
          - dry-run
        default: 'dry-run'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cleanup-branches:
    name: 'Clean Up Branches'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'List Branches'
        run: |
          echo "## Branch Cleanup Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get merged branches (excluding main and protected)
          MERGED=$(git branch -r --merged origin/main | grep -v 'main\|develop\|HEAD' || true)
          
          if [ -z "$MERGED" ]; then
            echo "✅ No merged branches to clean up" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Merged Branches (safe to delete)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$MERGED" | while read branch; do
              branch_name=${branch#origin/}
              echo "$branch_name" >> $GITHUB_STEP_SUMMARY
              
              if [ "${{ inputs.mode }}" == "full" ]; then
                echo "Deleting $branch_name..."
                # Would delete: git push origin --delete "$branch_name"
              fi
            done
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 'Stale Branches Check'
        run: |
          echo "### Stale Branches (>30 days inactive)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # This would check branch age in real implementation
          echo "Feature branches older than 30 days without activity:"
          echo "(Would need API access for accurate branch age)" 
          
          echo '```' >> $GITHUB_STEP_SUMMARY

  cleanup-releases:
    name: 'Clean Up Releases'
    runs-on: ubuntu-latest
    steps:
      - name: 'Check Old Releases'
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const oldReleases = releases.data.filter(r => {
              const age = Date.now() - new Date(r.created_at).getTime();
              const days = age / (1000 * 60 * 60 * 24);
              return days > 90 && !r.draft && !r.prerelease;
            });
            
            console.log(`Found ${oldReleases.length} releases older than 90 days`);
            
            // Summary
            console.log("## Release Cleanup", { total: releases.data.length, old: oldReleases.length });

  sync-labels:
    name: 'Sync Labels'
    runs-on: ubuntu-latest
    steps:
      - name: 'Sync Labels'
        uses: actions/github-script@v7
        with:
          script: |
            // Required labels
            const REQUIRED_LABELS = [
              { name: 'bug', color: 'd73a4a', description: 'Bug fix' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature' },
              { name: 'documentation', color: '0075ca', description: 'Documentation changes' },
              { name: 'ci', color: '808080', description: 'CI/CD changes' },
              { name: 'performance', color: 'fc9c4a', description: 'Performance improvements' },
              { name: 'chrome-os', color: '4287f5', description: 'Chrome OS specific' },
              { name: 'ai', color: '9b59b6', description: 'AI/ML related' },
              { name: 'help wanted', color: '008672', description: 'Looking for contributors' },
              { name: 'good first issue', color: '7057ff', description: 'Good for beginners' },
              { name: 'stale', color: 'eeeeee', description: 'Inactive issue' },
              { name: 'automated', color: 'e4e669', description: 'Automated changes' },
              { name: 'skip-changelog', color: 'cccccc', description: 'Skip in changelog' },
              { name: 'dependencies', color: '0366d6', description: 'Dependency updates' },
              { name: 'security', color: 'b60205', description: 'Security related' }
            ];
            
            // Get current labels
            const currentLabels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const existingNames = currentLabels.data.map(l => l.name);
            
            // Add missing labels
            for (const label of REQUIRED_LABELS) {
              if (!existingNames.includes(label.name)) {
                console.log(`Adding label: ${label.name}`);
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } catch (e) {
                  console.log(`Could not create ${label.name}: ${e.message}`);
                }
              }
            }
            
            console.log(`Label sync complete. ${REQUIRED_LABELS.length} labels configured.`);

  update-readme-stats:
    name: 'Update README Stats'
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 'Generate Stats'
        uses: actions/github-script@v7
        with:
          script: |
            // Get repo info
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const stats = {
              stars: repo.data.stargazers_count,
              forks: repo.data.forks_count,
              watchers: repo.data.subscribers_count,
              openIssues: repo.data.open_issues_count,
              language: repo.data.language,
              license: repo.data.license?.spdx_id || 'None'
            };
            
            console.log('## Repository Stats', stats);
            
            // This would update README with badges/stats
            console.log('Would update README with current stats');
